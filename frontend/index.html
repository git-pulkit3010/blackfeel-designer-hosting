<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUXE | AI T-Shirt Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="h-screen w-screen flex flex-col bg-[#0a0a0a] text-[#e5e5e5] font-['Inter',sans-serif] overflow-hidden">

    <div id="auth-modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
        <div class="bg-[#1a1a1a] border border-white/10 rounded-xl w-full max-w-md p-8">
            <div class="text-center mb-8">
                <div class="w-12 h-12 bg-gradient-to-tr from-yellow-700 to-yellow-500 rounded-sm mx-auto mb-4"></div>
                <h1 class="text-2xl tracking-widest text-white">LUXE<span class="text-yellow-600">.AI</span></h1>
                <p class="text-gray-500 text-sm mt-2">Premium T-Shirt Design Studio</p>
            </div>

            <div id="login-form">
                <h2 class="text-xl font-semibold mb-4">Sign In</h2>
                <input type="email" id="login-email" placeholder="Email" class="w-full bg-[#111] border border-white/10 rounded-lg p-3 mb-3 text-white placeholder-gray-600 focus:border-yellow-600 focus:outline-none transition">
                <input type="password" id="login-password" placeholder="Password" class="w-full bg-[#111] border border-white/10 rounded-lg p-3 mb-4 text-white placeholder-gray-600 focus:border-yellow-600 focus:outline-none transition">
                <button id="login-btn" class="w-full bg-yellow-600 hover:bg-yellow-700 text-black font-semibold py-3 rounded-lg transition">Sign In</button>
                <p class="text-center text-gray-500 text-sm mt-4">
                    New here? <button id="show-register-btn" class="text-yellow-600 hover:underline">Create Account</button>
                </p>
            </div>

            <div id="register-form" class="hidden">
                <h2 class="text-xl font-semibold mb-4">Create Account</h2>
                <input type="text" id="register-name" placeholder="Full Name" class="w-full bg-[#111] border border-white/10 rounded-lg p-3 mb-3 text-white placeholder-gray-600 focus:border-yellow-600 focus:outline-none transition">
                <input type="email" id="register-email" placeholder="Email" class="w-full bg-[#111] border border-white/10 rounded-lg p-3 mb-3 text-white placeholder-gray-600 focus:border-yellow-600 focus:outline-none transition">
                <input type="password" id="register-password" placeholder="Password (min 6 chars)" class="w-full bg-[#111] border border-white/10 rounded-lg p-3 mb-4 text-white placeholder-gray-600 focus:border-yellow-600 focus:outline-none transition">
                <button id="register-btn" class="w-full bg-yellow-600 hover:bg-yellow-700 text-black font-semibold py-3 rounded-lg transition">Create Account</button>
                <p class="text-center text-gray-500 text-sm mt-4">
                    Already have an account? <button id="show-login-btn" class="text-yellow-600 hover:underline">Sign In</button>
                </p>
            </div>
            <div id="auth-error" class="text-red-500 text-sm text-center mt-4 hidden"></div>
        </div>
    </div>

    <header class="h-16 shrink-0 border-b border-white/10 flex items-center justify-between px-4 md:px-8 z-50 header-bg">
        <div class="flex items-center gap-3">
            <div class="w-6 h-6 md:w-8 md:h-8 bg-gradient-to-tr from-yellow-700 to-yellow-500 rounded-sm"></div>
            <h1 class="text-xl md:text-2xl tracking-widest text-white serif">LUXE<span class="text-yellow-600">.AI</span></h1>
        </div>
        <div class="flex items-center gap-4">
            <div class="text-[10px] md:text-xs text-gray-500 uppercase tracking-widest">
                Generations: <span id="rate-limit-display" class="text-white font-bold">5</span> Left
            </div>
            <button id="logout-btn" class="text-[10px] md:text-xs text-gray-400 hover:text-white transition uppercase tracking-widest hidden">Logout</button>
        </div>
    </header>

    <main class="flex-1 flex flex-col md:flex-row overflow-hidden min-h-0">
        
        <section class="w-full h-[55vh] md:h-full md:flex-1 relative bg-[#0f0f0f] flex items-center justify-center overflow-hidden shrink-0 min-h-0">
            <div class="absolute inset-0 opacity-10 grid-bg"></div>

            <div class="relative w-full max-w-[400px] md:max-w-[500px] aspect-[5/6] max-h-full p-4 flex items-center justify-center transition-all duration-500">
                <img id="tshirt-base-img" src="assets/black-tshirt.png" alt="T-Shirt Canvas" class="w-full h-full object-contain tshirt-base pointer-events-none drop-shadow-2xl">

                <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                    <div id="design-wrapper" class="design-container pointer-events-auto relative hidden w-[120px] h-[120px] md:w-[200px] md:h-[200px]">
                        <img id="generated-image" src="" alt="Design" class="w-full h-full object-contain pointer-events-none select-none" draggable="false">
                        <div class="resize-handle" id="resize-handle"></div>
                    </div>
                </div>
            </div>
        </section>

        <aside class="w-full md:w-[400px] border-t md:border-t-0 md:border-l border-white/10 flex flex-col z-40 sidebar-bg shrink-0 h-full">
            
            <div class="p-4 md:p-6 border-b border-white/10 shrink-0">
                <h2 class="text-xs md:text-sm uppercase tracking-widest text-gray-400 mb-4 serif">Select Fabric</h2>
                <div class="flex gap-4">
                    <button data-src="assets/black-tshirt.png" class="color-btn w-8 h-8 md:w-10 md:h-10 rounded-full bg-[#1a1a1a] border border-white/20 hover:scale-110 transition-transform ring-2 ring-transparent focus:ring-yellow-600" title="Midnight Black"></button>
                    <button data-src="assets/white-tshirt.png" class="color-btn w-8 h-8 md:w-10 md:h-10 rounded-full bg-[#f5f5f5] border border-white/20 hover:scale-110 transition-transform ring-2 ring-transparent focus:ring-yellow-600" title="Pure White"></button>
                    <button data-src="assets/blue-tshirt.png" class="color-btn w-8 h-8 md:w-10 md:h-10 rounded-full bg-[#1e3a8a] border border-white/20 hover:scale-110 transition-transform ring-2 ring-transparent focus:ring-yellow-600" title="Navy Royal"></button>
                    <button data-src="assets/red-tshirt.png" class="color-btn w-8 h-8 md:w-10 md:h-10 rounded-full bg-[#7f1d1d] border border-white/20 hover:scale-110 transition-transform ring-2 ring-transparent focus:ring-yellow-600" title="Crimson Red"></button>
                </div>
            </div>

            <div class="p-4 md:p-6 flex flex-col gap-4 shrink-0">
                <h2 class="text-xs md:text-sm uppercase tracking-widest text-gray-400 serif">Art Direction</h2>
                <textarea id="prompt-input" class="w-full bg-[#111] border border-white/10 rounded p-4 text-sm md:text-base text-white placeholder-gray-600 focus:outline-none focus:border-yellow-600 transition-colors resize-none h-20 md:h-28" placeholder="Describe your vision..."></textarea>

                <button id="generate-btn" class="w-full py-3 md:py-4 bg-white text-black text-sm md:text-base font-medium tracking-widest uppercase hover:bg-yellow-500 transition-all duration-300 disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2">
                    <span>Generate Design</span>
                    <div id="btn-loader" class="loader hidden"></div>
                </button>

                <button id="buy-now-btn" class="w-full py-3 md:py-4 bg-yellow-600 text-black text-sm md:text-base font-medium tracking-widest uppercase hover:bg-yellow-700 transition-all duration-300 disabled:opacity-50 disabled:cursor-not-allowed hidden">
                    <span>BUY NOW - ₹499</span>
                </button>
            </div>

            <div class="flex-1 border-t border-white/10 flex flex-col bg-[#0f0f0f] min-h-0">
                <div class="p-4 border-b border-white/5 flex justify-between items-center shrink-0">
                    <h3 class="text-[10px] md:text-xs uppercase tracking-widest text-gray-500 serif">Design Archives</h3>
                    <span class="text-[9px] md:text-[10px] text-gray-600">Click to restore</span>
                </div>
                <div id="history-list" class="flex-1 overflow-y-auto p-4 grid grid-cols-4 gap-2 content-start">
                    <div class="col-span-4 text-center text-gray-600 text-xs py-4 md:py-8 italic" id="empty-history">No designs generated yet.</div>
                </div>
            </div>
        </aside>
    </main>

    <script src="app.js"></script>
</body>
</html>
